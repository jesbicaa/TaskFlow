name: CI Quality Assurance

on: [push, pull_request]

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Configurar Ambiente Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar Dependências do Sistema
      run: |
        pip install Flask pytest flake8

    - name: Análise de Qualidade de Código (Linter Flake8)
      run: |
        # Para a execução se houver erros de sintaxe ou violações estruturais graves
        flake8 src/app.py --count --max-line-length=120 --statistics --exit-zerocs

    - name: Execução da Suíte de Testes Automatizados (Pytest)
      run: |
        pytest tests/
        