<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>TaskFlow — Painel Web Logístico</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f6f9; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; margin-bottom: 20px; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; }
        form { background: #f8f9fa; padding: 20px; border-radius: 6px; margin-bottom: 25px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        input[name="titulo"] { flex: 2; min-width: 200px; }
        input[name="descricao"] { flex: 3; min-width: 300px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #e2e8f0; padding: 12px; text-align: left; }
        th { background-color: #2c3e50; color: white; font-weight: 600; }
        tr:nth-child(even) { background-color: #f8fafc; }
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .badge-alta { background: #fed7d7; color: #9b2c2c; }
        .badge-media { background: #feebc8; color: #9c4221; }
        .badge-baixa { background: #e6fffa; color: #234e52; }
        .btn { padding: 6px 12px; text-decoration: none; border-radius: 4px; color: white; font-size: 13px; display: inline-block; transition: background 0.2s; }
        .btn-add { background: #27ae60; border: none; cursor: pointer; padding: 10px 20px; font-size: 14px; }
        .btn-progress { background: #2980b9; }
        .btn-done { background: #27ae60; }
        .btn-del { background: #c0392b; }
        .btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="container">
        <h1>TaskFlow — Sistema Ágil de Gerenciamento de Tarefas</h1>
        
        <form action="/criar" method="POST">
            <input type="text" name="titulo" placeholder="Título da demanda logística" required>
            <input type="text" name="descricao" placeholder="Descrição detalhada do fluxo" required>
            <select name="prioridade">
                <option value="Baixa">Baixa</option>
                <option value="Media" selected>Média</option>
                <option value="Alta">Alta</option>
            </select>
            <button type="submit" class="btn btn-add">Cadastrar Tarefa</button>
        </form>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Título</th>
                    <th>Descrição</th>
                    <th>Prioridade</th>
                    <th>Status</th>
                    <th>Mover Fluxo / Ações</th>
                </tr>
            </thead>
            <tbody>
                {% for t in tarefas %}
                <tr>
                    <td>{{ t.id }}</td>
                    <td>{{ t.titulo }}</td>
                    <td>{{ t.descricao }}</td>
                    <td>
                        <span class="badge badge-{{ t.prioridade.lower() }}">{{ t.prioridade }}</span>
                    </td>
                    <td><b>{{ t.status }}</b></td>
                    <td>
                        <a href="/atualizar/{{ t.id }}/In Progress" class="btn btn-progress">In Progress</a>
                        <a href="/atualizar/{{ t.id }}/Done" class="btn btn-done">Done</a>
                        <a href="/deletar/{{ t.id }}" class="btn btn-del">Excluir</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
